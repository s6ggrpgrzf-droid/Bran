<svg viewBox="0 0 80 110" xmlns="http://www.w3.org/2000/svg">
  <!-- Tail (fluffy, with stripes) -->
  <g>
    <path d="M 58 85 Q 75 82 82 62" stroke="#C8714F" stroke-width="9" fill="none" stroke-linecap="round"/>
    <!-- Tail stripes -->
    <path d="M 60 83 L 63 80" stroke="#8B5A2B" stroke-width="1.2" opacity="0.6"/>
    <path d="M 69 77 L 73 73" stroke="#8B5A2B" stroke-width="1.2" opacity="0.6"/>
    <path d="M 77 69 L 80 65" stroke="#8B5A2B" stroke-width="1.2" opacity="0.6"/>
  </g>

  <!-- Body/Clothes -->
  <ellipse cx="40" cy="72" rx="18" ry="22" fill="#2FA8A8"/>
  <!-- Shirt details -->
  <circle cx="35" cy="70" r="1.5" fill="#FFD700"/>
  <circle cx="45" cy="70" r="1.5" fill="#FFD700"/>

  <!-- Pants -->
  <rect x="36" y="92" width="8" height="13" fill="#1a1a4d" rx="1.5"/>

  <!-- Paws -->
  <circle cx="39" cy="106" r="2" fill="#C8714F"/>
  <circle cx="43" cy="106" r="2" fill="#C8714F"/>

  <!-- Arms -->
  <rect x="26" y="65" width="5.5" height="14" fill="#2FA8A8" rx="2.75"/>
  <circle cx="28.5" cy="80" r="3" fill="#C8714F"/>
  <rect x="48.5" y="65" width="5.5" height="14" fill="#2FA8A8" rx="2.75"/>
  <circle cx="51.5" cy="80" r="3" fill="#C8714F"/>

  <!-- Head (bigger, rounder) -->
  <circle cx="40" cy="38" r="20" fill="#C8714F"/>

  <!-- Snout/Muzzle (fox feature) -->
  <ellipse cx="40" cy="46" rx="10" ry="8" fill="#E8B384"/>

  <!-- Ears (pointed) -->
  <g>
    <!-- Left ear -->
    <polygon points="25,18 17,0 21,26" fill="#C8714F"/>
    <polygon points="25,18 22,7 24,24" fill="#E8B384"/>
    <!-- Right ear -->
    <polygon points="55,18 63,0 59,26" fill="#C8714F"/>
    <polygon points="55,18 58,7 56,24" fill="#E8B384"/>
  </g>

  <!-- Hair puff -->
  <circle cx="32" cy="18" r="5" fill="#D4860F"/>
  <circle cx="48" cy="18" r="5" fill="#D4860F"/>
  <circle cx="40" cy="10" r="6" fill="#D4860F"/>

  <!-- Hair ribbon (blue) -->
  <ellipse cx="40" cy="8" rx="10" ry="5" fill="#2FA8A8"/>
  <circle cx="33" cy="6" r="1.5" fill="#2FA8A8"/>
  <circle cx="47" cy="6" r="1.5" fill="#2FA8A8"/>

  <!-- Big eyes (very cute) -->
  <g>
    <!-- Left eye -->
    <ellipse cx="33" cy="37" rx="4.5" ry="6" fill="#FFF"/>
    <circle cx="33" cy="39" r="2.8" fill="#000"/>
    <circle cx="34" cy="37" r="1.3" fill="#FFF"/>

    <!-- Right eye -->
    <ellipse cx="47" cy="37" rx="4.5" ry="6" fill="#FFF"/>
    <circle cx="47" cy="39" r="2.8" fill="#000"/>
    <circle cx="48" cy="37" r="1.3" fill="#FFF"/>
  </g>

  <!-- Eyebrows -->
  <path d="M 30 32 Q 33 30 36 32" stroke="#8B5A2B" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M 44 32 Q 47 30 50 32" stroke="#8B5A2B" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="40" cy="44" rx="2" ry="2.5" fill="#000"/>

  <!-- Cute smile -->
  <path d="M 37 50 Q 40 52 43 50" stroke="#000" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Blush marks -->
  <circle cx="26" cy="42" r="2.5" fill="#FFB6C1" opacity="0.7"/>
  <circle cx="54" cy="42" r="2.5" fill="#FFB6C1" opacity="0.7"/>
</svg>