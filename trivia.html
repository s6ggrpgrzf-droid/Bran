      // ── Star Wars ──
      {
        series: 'starwars',
        seriesLabel: 'Star Wars ✨',
        seriesColor: '#eab308',

        answers: ["Darth Maul", "Darth Plagueis", "Darth Tyranus", "Darth Vader"],
        correct: 3
      },
      {

        seriesLabel: 'Star Wars ✨',
        seriesColor: '#eab308',
        q: "What color is Mace Windu's lightsaber?",
        answers: ["Blue", "Green", "Red", "Purple"],
        correct: 3
      },
      {
        series: 'starwars',
        seriesLabel: 'Star Wars ✨',
        seriesColor: '#eab308',
        q: "What species is Yoda?",
        answers: ["Rodian", "Jedi", "Goblin", "Unknown (unnamed species)"],
        correct: 3
      },
      {
        series: 'starwars',
        seriesLabel: 'Star Wars ✨',
        seriesColor: '#eab308',
        q: "What is the Millennium Falcon's most famous feat?",
        answers: ["Never breaking down", "Fastest ship in the Republic", "Has a cloaking device", "Kessel Run in 12 parsecs"],
        correct: 3
      },
      {
        series: 'starwars',
        seriesLabel: 'Star Wars ✨',
        seriesColor: '#eab308',
        q: 'Who famously said "I am your father"?',
        answers: ["Darth Sidious", "Obi-Wan Kenobi", "Yoda", "Darth Vader"],
        correct: 3
      },
      {
        series: 'starwars',
        seriesLabel: 'Star Wars ✨',
        seriesColor: '#eab308',
        q: "What planet is Han Solo from?",
        answers: ["Tatooine", "Coruscant", "Mandalore", "Corellia"],
        correct: 3
      },
      {
        series: 'starwars',
        seriesLabel: 'Star Wars ✨',
        seriesColor: '#eab308',
        q: "What is Princess Leia's home planet?",
        answers: ["Naboo", "Coruscant", "Tatooine", "Alderaan"],
        correct: 3
      },
      {
        series: 'starwars',
        seriesLabel: 'Star Wars ✨',
        seriesColor: '#eab308',
        q: "What is the Force-sensitive child in The Mandalorian called?",
        answers: ["Yaddle", "Yoda", "Wookiee", "Grogu (Baby Yoda)"],
        correct: 3
      },
      {
        series: 'starwars',
        seriesLabel: 'Star Wars ✨',
        seriesColor: '#eab308',
        q: "Who trained Obi-Wan Kenobi as a Padawan?",
        answers: ["Yoda", "Mace Windu", "Count Dooku", "Qui-Gon Jinn"],
        correct: 3
      },
      {
        series: 'starwars',
        seriesLabel: 'Star Wars ✨',
        seriesColor: '#eab308',
        q: "How does R2-D2 primarily communicate?",
        answers: ["Binary code", "English subtitles", "Holographic messages", "Beeps and whistles"],
        correct: 3
      },
    ];

    // ── State ─────────────────────────────────────────────────
    let activeFilter = 'all';
    let deck = [];
    let deckIdx = 0;
    let scoreCorrect = 0;

    // ── Helpers ───────────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function gradeInfo(correct, total) {
      const pct = total === 0 ? 0 : correct / total;
      if (pct >= 0.9) return { emoji: '🏆', title: 'Legendary!',    sub: "You really know your stuff." };
      if (pct >= 0.7) return { emoji: '⭐', title: 'Nice work!',     sub: "Solid nerd credentials." };
      if (pct >= 0.5) return { emoji: '👍', title: 'Not bad!',       sub: "Worth a rewatch, maybe?" };
      return               { emoji: '🌱', title: 'Keep studying!', sub: "The force will guide you." };
    }

    // ── Build deck ────────────────────────────────────────────
    function buildDeck() {
      const pool = activeFilter === 'all'
        ? QUESTIONS
        : QUESTIONS.filter(q => q.series === activeFilter);
      deck = shuffle(pool).map(q => {
        // Shuffle answers while tracking which index is correct
        const paired = q.answers.map((a, i) => ({ text: a, isCorrect: i === q.correct }));
        const shuffled = shuffle(paired);
        return { ...q, shuffledAnswers: shuffled };
      });
      deckIdx = 0;
      scoreCorrect = 0;
      updateScore();
    }

    // ── Score display ─────────────────────────────────────────
    function updateScore() {
      document.getElementById('score-correct').textContent = scoreCorrect;
      document.getElementById('score-total').textContent   = deckIdx;
    }

    // ── Render question ───────────────────────────────────────
    function renderQuestion() {
      const wrap = document.getElementById('question-wrap');
      const q    = deck[deckIdx];
      const progress = ((deckIdx / deck.length) * 100).toFixed(1);

      wrap.innerHTML = `
        <div class="question-card" role="region" aria-label="Question ${deckIdx + 1} of ${deck.length}">
          <div class="progress-bar" role="progressbar"
               aria-valuenow="${deckIdx}" aria-valuemin="0" aria-valuemax="${deck.length}"
               aria-label="Question progress">
            <div class="progress-bar-inner" style="width:${progress}%"></div>
          </div>
          <div class="question-body">
            <span class="question-series-badge"
                  style="--series-color:${q.seriesColor}">${q.seriesLabel}</span>
            <p class="question-text">${q.q}</p>
          </div>
          <div class="answer-grid" role="group" aria-label="Answer choices">
            ${q.shuffledAnswers.map((a, i) => `
              <button class="answer-btn" data-idx="${i}"
                      aria-label="Answer option: ${a.text}">
                ${a.text}
              </button>`).join('')}
          </div>
        </div>`;

      wrap.querySelectorAll('.answer-btn').forEach(btn => {
        btn.addEventListener('click', () => handleAnswer(btn, q));
      });
    }

    // ── Handle answer ─────────────────────────────────────────
    function handleAnswer(btn, q) {
      const wrap    = document.getElementById('question-wrap');
      const allBtns = wrap.querySelectorAll('.answer-btn');
      const idx     = parseInt(btn.dataset.idx, 10);
      const correct = q.shuffledAnswers[idx].isCorrect;

      allBtns.forEach(b => b.disabled = true);

      if (correct) {
        btn.classList.add('correct');
        scoreCorrect++;
      } else {
        btn.classList.add('wrong');
        // Reveal the right answer
        allBtns.forEach((b, i) => {
          if (q.shuffledAnswers[i].isCorrect) b.classList.add('reveal-correct');
        });
      }

      deckIdx++;
      updateScore();

      setTimeout(() => {
        if (deckIdx < deck.length) {
          renderQuestion();
        } else {
          renderResults();
        }
      }, 900);
    }

    // ── Results ───────────────────────────────────────────────
    function renderResults() {
      const wrap  = document.getElementById('question-wrap');
      const total = deck.length;
      const g     = gradeInfo(scoreCorrect, total);

      wrap.innerHTML = `
        <div class="results-card">
          <div class="results-grade" aria-hidden="true">${g.emoji}</div>
          <div class="results-title">${g.title}</div>
          <div class="results-subtitle">
            You got <strong>${scoreCorrect} out of ${total}</strong> — ${g.sub}
          </div>
          <button class="results-again-btn" id="play-again">Play Again</button>
        </div>`;

      document.getElementById('play-again').addEventListener('click', () => {
        buildDeck();
        renderQuestion();
      });
    }

    // ── Filter ────────────────────────────────────────────────
    document.querySelectorAll('.trivia-filter__btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.trivia-filter__btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        buildDeck();
        renderQuestion();
      });
    });

    // ── Init ──────────────────────────────────────────────────
    buildDeck();
    renderQuestion();
  </script>
