<body>

  <header role="banner">
    <div class="petals" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span><span></span>

    <div class="container">
      <div class="header-sparkles" aria-hidden="true">✦ ✧ ✦</div>
      <h1>Trivia</h1>

  <main id="main-content">
    <section aria-labelledby="trivia-heading">
      <div class="container">
        <h2 id="trivia-heading" class="sr-only">Trivia Quiz</h2>

        <!-- Game area -->
        <div id="question-wrap"></div>

      </div>
    </section>
  </main>

  <footer role="contentinfo">
    <div class="container">
      <p>Made with ❤️ for Brandon</p>
    </div>
  </footer>

  <nav class="bottom-nav" aria-label="Main navigation">
    <a href="index.html" class="bottom-nav__item">
      <span class="bottom-nav__icon" aria-hidden="true">🌸</span>
      <span class="bottom-nav__label">Wellness</span>
    </a>
    <a href="characters.html" class="bottom-nav__item">
      <span class="bottom-nav__icon" aria-hidden="true">⭐</span>
      <span class="bottom-nav__label">Characters</span>
    </a>
    <a href="breathing.html" class="bottom-nav__item">
      <span class="bottom-nav__icon" aria-hidden="true">🌬️</span>
      <span class="bottom-nav__label">Breathing</span>

    <a href="weather.html" class="bottom-nav__item">
      <span class="bottom-nav__icon" aria-hidden="true">🌤️</span>
      <span class="bottom-nav__label">Weather</span>
    </a>
    <a href="trivia.html" class="bottom-nav__item active" aria-current="page">
      <span class="bottom-nav__icon" aria-hidden="true">🎯</span>
      <span class="bottom-nav__label">Trivia</span>

    <a href="fidget-games.html" class="bottom-nav__item">
      <span class="bottom-nav__icon" aria-hidden="true">🎮</span>
      <span class="bottom-nav__label">Fidgets</span>
    </a>
    <a href="memorial.html" class="bottom-nav__item">
      <span class="bottom-nav__icon" aria-hidden="true">💜</span>
      <span class="bottom-nav__label">Mom</span>
    </a>
  </nav>

  <script src="trivia-questions.js?v=2"></script>
  <script>
    'use strict';

    // ── Star field ────────────────────────────────────────────
    (function createStars() {
      const c = document.getElementById('bg-stars');
      for (let i = 0; i < 55; i++) {
        const s = document.createElement('div');
        s.className = 'bg-star';
        const sz = 1.5 + Math.random() * 3;
        s.style.cssText = [
          `left:${(Math.random()*100).toFixed(2)}%`,
          `top:${(Math.random()*100).toFixed(2)}%`,
          `width:${sz.toFixed(1)}px`, `height:${sz.toFixed(1)}px`,
          `animation-delay:${(Math.random()*5).toFixed(2)}s`,
          `animation-duration:${(1.5+Math.random()*3).toFixed(2)}s`,
        ].join(';');
        c.appendChild(s);
      }
    })();

    // ── Constants ─────────────────────────────────────────────
    const TIMER_SECS  = 15;
    const MAX_LIVES   = 3;
    const Q_COUNT     = 20;
    const ANSWER_LETTERS = ['A', 'B', 'C', 'D'];

    const SERIES_META = [
      { id:'all',      label:'All Series',   icon:'🎯', color:'#e87ca0', count: TRIVIA_QUESTIONS.length },
      { id:'naruto',   label:'Naruto',        icon:'🍥', color:'#f97316', count: TRIVIA_QUESTIONS.filter(q=>q.series==='naruto').length },
      { id:'inuyasha', label:'Inuyasha',      icon:'⚔️', color:'#9333ea', count: TRIVIA_QUESTIONS.filter(q=>q.series==='inuyasha').length },
      { id:'starwars', label:'Star Wars',     icon:'✨', color:'#eab308', count: TRIVIA_QUESTIONS.filter(q=>q.series==='starwars').length },
      { id:'music',    label:'Music',         icon:'🎵', color:'#22d3ee', count: TRIVIA_QUESTIONS.filter(q=>q.series==='music').length },
    ];

    // ── State ─────────────────────────────────────────────────
    let lives        = MAX_LIVES;
    let score        = 0;
    let deck         = [];
    let deckIdx      = 0;
    let timerVal     = TIMER_SECS;
    let timerInterval = null;
    let activeSeries = 'all';
    let answering    = false;

    // ── Helpers ───────────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function gradeInfo(correct, total) {
      const pct = total === 0 ? 0 : correct / total;
      if (pct >= 0.9) return { emoji:'🏆', title:'Legendary!',    sub:'Naruto would be proud of you, Brandon.',              grad:'linear-gradient(135deg,#fef9c3,#fde68a)' };
      if (pct >= 0.7) return { emoji:'⭐', title:'Nice work!',     sub:'Solid nerd credentials — Jiraiya approves.',          grad:'linear-gradient(135deg,#dbeafe,#bfdbfe)' };
      if (pct >= 0.5) return { emoji:'👍', title:'Not bad!',       sub:'Worth a rewatch. Even Rock Lee had to keep training.', grad:'linear-gradient(135deg,#dcfce7,#bbf7d0)' };
      return               { emoji:'🌱', title:'Keep at it!',    sub:'The force is still with you, always.',                grad:'linear-gradient(135deg,#fce7f3,#ede9fe)' };
    }

    function heartsHTML() {
      return Array.from({ length: MAX_LIVES }, (_, i) =>
        `<span class="heart${i >= lives ? ' lost' : ''}" aria-hidden="true">${i < lives ? '❤️' : '🤍'}</span>`
      ).join('');
    }

    function stopTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    // ── Build deck ─────────────────────────────────────────────
    function buildDeck(filter) {
      const pool = filter === 'all'
        ? TRIVIA_QUESTIONS
        : TRIVIA_QUESTIONS.filter(q => q.series === filter);

      deck = shuffle(pool).slice(0, Q_COUNT).map(q => {
        const paired   = q.answers.map((a, i) => ({ text: a, isCorrect: i === q.correct }));
        const shuffled = shuffle(paired);
        return { ...q, shuffledAnswers: shuffled };
      });
    }

    // ── Start game ─────────────────────────────────────────────
    function startGame(filter) {
      activeSeries = filter;
      lives        = MAX_LIVES;
      score        = 0;
      deckIdx      = 0;
      buildDeck(filter);
      if (deck.length === 0) { renderStart(); return; }
      renderQuestion();
    }

    // ── Start screen ───────────────────────────────────────────
    function renderStart() {
      stopTimer();
      answering = false;
      const wrap = document.getElementById('question-wrap');
      wrap.innerHTML = `
        <div class="start-card">
          <h2>Pick a Series</h2>
          <p class="start-subtitle">${Q_COUNT} questions · ${MAX_LIVES} lives · ${TIMER_SECS} sec each</p>
          <div class="series-picker" role="group" aria-label="Choose series">
            ${SERIES_META.map(s => `
              <button class="series-card" style="--series-color:${s.color}"
                      data-series="${s.id}" aria-label="Play ${s.label}">
                <span class="series-card-icon" aria-hidden="true">${s.icon}</span>
                <span class="series-card-name">${s.label}</span>
                <span class="series-card-count">${Math.min(s.count, Q_COUNT)} questions</span>
              </button>`).join('')}
          </div>
        </div>`;

      wrap.querySelectorAll('.series-card').forEach(btn => {
        btn.addEventListener('click', () => startGame(btn.dataset.series));
      });
    }

    // ── Timer bar helpers ──────────────────────────────────────
    function updateTimerBar() {
      const inner = document.getElementById('timer-inner');
      if (!inner) return;
      const pct = (timerVal / TIMER_SECS * 100).toFixed(1);
      inner.style.width = pct + '%';
      inner.className = 'progress-bar-inner' +
        (timerVal <= 4 ? ' timer-urgent' : timerVal <= 8 ? ' timer-warn' : '');
    }

    // ── Render question ────────────────────────────────────────
    function renderQuestion() {
      stopTimer();
      answering = false;
      timerVal  = TIMER_SECS;

      const wrap = document.getElementById('question-wrap');
      const q    = deck[deckIdx];

      wrap.innerHTML = `
        <div class="question-card" role="region"
             aria-label="Question ${deckIdx + 1} of ${deck.length}"
             style="--series-color:${q.seriesColor}">
          <div class="question-series-header"></div>
          <div class="progress-bar" role="timer" aria-label="Time remaining">
            <div class="progress-bar-inner" id="timer-inner" style="width:100%"></div>
          </div>
          <div class="game-header">
            <div class="lives" aria-label="${lives} lives remaining">${heartsHTML()}</div>
            <div class="q-counter">Q ${deckIdx + 1} / ${deck.length}</div>
            <div class="score-badge" aria-label="Score: ${score}">⭐ ${score}</div>
          </div>
          <div class="question-body">
            <span class="question-series-badge"
                  style="--series-color:${q.seriesColor}">${q.seriesLabel}</span>
            <p class="question-text">${q.q}</p>
          </div>
          <div class="answer-grid" role="group" aria-label="Answer choices">
            ${q.shuffledAnswers.map((a, i) => `
              <button class="answer-btn" data-idx="${i}"
                      aria-label="${ANSWER_LETTERS[i]}: ${a.text}">
                <span class="answer-letter" aria-hidden="true">${ANSWER_LETTERS[i]}</span>
                <span>${a.text}</span>
              </button>`).join('')}
          </div>
        </div>`;

      wrap.querySelectorAll('.answer-btn').forEach(btn => {
        btn.addEventListener('click', () => handleAnswer(btn, q));
      });

      startTimer(q);
    }

    // ── Timer ──────────────────────────────────────────────────
    function startTimer(q) {
      updateTimerBar();
      timerInterval = setInterval(() => {
        timerVal--;
        updateTimerBar();
        if (timerVal <= 0) {
          stopTimer();
          handleTimeout(q);
        }
      }, 1000);
    }

    function handleTimeout(q) {
      if (answering) return;
      answering = true;
      const wrap    = document.getElementById('question-wrap');
      const allBtns = wrap.querySelectorAll('.answer-btn');
      allBtns.forEach(b => b.disabled = true);
      allBtns.forEach((b, i) => {
        if (q.shuffledAnswers[i].isCorrect) b.classList.add('reveal-correct');
      });
      lives--;
      advanceAfterAnswer(wrap);
    }

    // ── Handle answer ──────────────────────────────────────────
    function handleAnswer(btn, q) {
      if (answering) return;
      answering = true;
      stopTimer();

      const wrap    = document.getElementById('question-wrap');
      const allBtns = wrap.querySelectorAll('.answer-btn');
      const idx     = parseInt(btn.dataset.idx, 10);
      const correct = q.shuffledAnswers[idx].isCorrect;

      allBtns.forEach(b => b.disabled = true);

      if (correct) {
        btn.classList.add('correct');
        score++;
      } else {
        btn.classList.add('wrong');
        allBtns.forEach((b, i) => {
          if (q.shuffledAnswers[i].isCorrect) b.classList.add('reveal-correct');
        });
        lives--;
      }

      advanceAfterAnswer(wrap);
    }

    function advanceAfterAnswer(wrap) {
      // Update hearts immediately
      const livesEl = wrap.querySelector('.lives');
      if (livesEl) livesEl.innerHTML = heartsHTML();
      const scoreEl = wrap.querySelector('.score-badge');
      if (scoreEl) scoreEl.textContent = `⭐ ${score}`;

      deckIdx++;
      setTimeout(() => {
        if (lives <= 0)            renderGameOver();
        else if (deckIdx >= deck.length) renderResults();
        else                             renderQuestion();
      }, 950);
    }

    // ── Game over ──────────────────────────────────────────────
    function renderGameOver() {
      stopTimer();
      const wrap = document.getElementById('question-wrap');
      wrap.innerHTML = `
        <div class="results-card" style="--results-grad:linear-gradient(135deg,#fce7f3,#ffe4e6)">
          <div class="results-grade" aria-hidden="true">💔</div>
          <div class="results-title">Game Over</div>
          <div class="results-subtitle">
            You got <strong>${score} out of ${deckIdx}</strong> before running out of lives.
          </div>
          <div class="results-buttons">
            <button class="results-again-btn" id="play-again">Try Again</button>
            <button class="results-back-btn" id="back-start">Change Series</button>
          </div>
        </div>`;
      document.getElementById('play-again').addEventListener('click', () => startGame(activeSeries));
      document.getElementById('back-start').addEventListener('click', renderStart);
    }

    // ── Results ────────────────────────────────────────────────
    function renderResults() {
      stopTimer();
      const wrap = document.getElementById('question-wrap');
      const g    = gradeInfo(score, Q_COUNT);
      wrap.innerHTML = `
        <div class="results-card" style="--results-grad:${g.grad}">
          <div class="results-grade" aria-hidden="true">${g.emoji}</div>
          <div class="results-title">${g.title}</div>
          <div class="results-subtitle">
            You got <strong>${score} out of ${Q_COUNT}</strong> — ${g.sub}
          </div>
          <div class="results-buttons">
            <button class="results-again-btn" id="play-again">Play Again</button>
            <button class="results-back-btn" id="back-start">Change Series</button>
          </div>
        </div>`;
      document.getElementById('play-again').addEventListener('click', () => startGame(activeSeries));
      document.getElementById('back-start').addEventListener('click', renderStart);
    }

    // ── Keyboard shortcuts (1-4) ───────────────────────────────
    document.addEventListener('keydown', e => {
      const keyMap = { '1':0, '2':1, '3':2, '4':3 };
      const idx = keyMap[e.key];
      if (idx === undefined || answering) return;
      const wrap = document.getElementById('question-wrap');
      const btns = wrap.querySelectorAll('.answer-btn:not(:disabled)');
      if (btns[idx]) btns[idx].click();
    });

    // ── Init ───────────────────────────────────────────────────
    renderStart();
  </script>
</body>
