<!DOCTYPE html>

<body>

  <header role="banner">
    <div class="petals" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="container">
      <div class="header-sparkles" aria-hidden="true">✦ ✧ ✦</div>
      <h1>Trivia</h1>
      <p class="tagline">🎯 Test your nerd knowledge</p>
    </div>
  </header>

  <main id="main-content">
    <section aria-labelledby="trivia-heading">
      <div class="container">
        <h2 id="trivia-heading" class="sr-only">Trivia Quiz</h2>

        <!-- Filter -->
        <div class="trivia-filter" role="group" aria-label="Filter by series">
          <button class="trivia-filter__btn active"
                  style="--series-color:#e87ca0"
                  data-filter="all">All</button>
          <button class="trivia-filter__btn"
                  style="--series-color:#f97316"
                  data-filter="naruto">Naruto 🍥</button>
          <button class="trivia-filter__btn"
                  style="--series-color:#9333ea"
                  data-filter="inuyasha">Inuyasha ⚔️</button>
          <button class="trivia-filter__btn"
                  style="--series-color:#eab308"
                  data-filter="starwars">Star Wars ✨</button>
        </div>

        <!-- Score -->
        <div class="trivia-hero">
          <div class="trivia-score" id="score-display" aria-live="polite">
            <span id="score-correct">0</span>
            <span>/</span>
            <span id="score-total">0</span>
          </div>
        </div>

        <!-- Question card -->
        <div id="question-wrap"></div>

      </div>
    </section>
  </main>

  <footer role="contentinfo">
    <div class="container">
      <p>Made with ❤️ for Brandon</p>
    </div>
  </footer>

  <nav class="bottom-nav" aria-label="Main navigation">

      <span class="bottom-nav__label">Characters</span>
    </a>
    <a href="breathing.html" class="bottom-nav__item">
      <span class="bottom-nav__icon" aria-hidden="true">🌬️</span>
      <span class="bottom-nav__label">Breathing</span>
    </a>
    <a href="weather.html" class="bottom-nav__item">
      <span class="bottom-nav__icon" aria-hidden="true">🌤️</span>
      <span class="bottom-nav__label">Weather</span>
    </a>
    <a href="trivia.html" class="bottom-nav__item active" aria-current="page">
      <span class="bottom-nav__icon" aria-hidden="true">🎯</span>
      <span class="bottom-nav__label">Trivia</span>
    </a>
    <a href="fidget-games.html" class="bottom-nav__item">
      <span class="bottom-nav__icon" aria-hidden="true">🎮</span>
      <span class="bottom-nav__label">Fidgets</span>
    </a>
    <a href="memorial.html" class="bottom-nav__item">
      <span class="bottom-nav__icon" aria-hidden="true">💜</span>

  </nav>

  <script src="trivia-questions.js"></script>
  <script>
    'use strict';

    // ── Star field ────────────────────────────────────────────
    (function createStars() {
      const c = document.getElementById('bg-stars');
      for (let i = 0; i < 55; i++) {
        const s = document.createElement('div');
        s.className = 'bg-star';
        const sz = 1.5 + Math.random() * 3;
        s.style.cssText = [
          `left:${(Math.random()*100).toFixed(2)}%`,
          `top:${(Math.random()*100).toFixed(2)}%`,
          `width:${sz.toFixed(1)}px`, `height:${sz.toFixed(1)}px`,
          `animation-delay:${(Math.random()*5).toFixed(2)}s`,
          `animation-duration:${(1.5+Math.random()*3).toFixed(2)}s`,
        ].join(';');
        c.appendChild(s);
      }
    })();

    // ── Round metadata ────────────────────────────────────────
    const ROUND_META = [
      { icon: '🌱', label: 'Beginner',    grad: 'linear-gradient(135deg,#bbf7d0,#4ade80)', text: '#14532d' },
      { icon: '🌿', label: 'Easy',        grad: 'linear-gradient(135deg,#99f6e4,#2dd4bf)', text: '#134e4a' },
      { icon: '⭐', label: 'Medium',      grad: 'linear-gradient(135deg,#bfdbfe,#60a5fa)', text: '#1e3a8a' },
      { icon: '🔥', label: 'Challenging', grad: 'linear-gradient(135deg,#fed7aa,#fb923c)', text: '#7c2d12' },
      { icon: '⚡', label: 'Hard',        grad: 'linear-gradient(135deg,#fef08a,#facc15)', text: '#713f12' },
      { icon: '💪', label: 'Expert',      grad: 'linear-gradient(135deg,#fecaca,#f87171)', text: '#7f1d1d' },
      { icon: '🧠', label: 'Master',      grad: 'linear-gradient(135deg,#e9d5ff,#c084fc)', text: '#4a1d96' },
      { icon: '💀', label: 'Legend',      grad: 'linear-gradient(135deg,#cbd5e1,#64748b)', text: '#0f172a' },
    ];

    // ── State ─────────────────────────────────────────────────
    let activeRound = null;
    let completedRounds = new Set();
    let deck = [];
    let deckIdx = 0;
    let scoreCorrect = 0;

    const ANSWER_LETTERS = ['A', 'B', 'C', 'D'];

    // ── Helpers ───────────────────────────────────────────────
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function gradeInfo(correct, total) {
      const pct = total === 0 ? 0 : correct / total;
      if (pct >= 0.9) return { emoji: '🏆', title: 'Legendary!',    sub: "You really know your stuff.", grad: 'linear-gradient(135deg,#fef9c3,#fde68a)' };
      if (pct >= 0.7) return { emoji: '⭐', title: 'Nice work!',     sub: "Solid nerd credentials.",    grad: 'linear-gradient(135deg,#dbeafe,#bfdbfe)' };
      if (pct >= 0.5) return { emoji: '👍', title: 'Not bad!',       sub: "Worth a rewatch, maybe?",    grad: 'linear-gradient(135deg,#dcfce7,#bbf7d0)' };
      return               { emoji: '🌱', title: 'Keep studying!', sub: "The force will guide you.",    grad: 'linear-gradient(135deg,#fce7f3,#ede9fe)' };
    }

    function saveRoundCompletion(roundNum) {
      const completed = JSON.parse(localStorage.getItem('completedRounds') || '[]');
      if (!completed.includes(roundNum)) {
        completed.push(roundNum);
        localStorage.setItem('completedRounds', JSON.stringify(completed));
      }
      completedRounds.add(roundNum);
    }

    function loadCompletedRounds() {
      const completed = JSON.parse(localStorage.getItem('completedRounds') || '[]');
      completedRounds = new Set(completed);
    }

    // ── Render round selector ──────────────────────────────────
    function renderRoundSelector() {
      loadCompletedRounds();
      const wrap = document.getElementById('question-wrap');
      const filterWrap = document.querySelector('.trivia-filter');
      const scoreDisplay = document.getElementById('score-display');

      filterWrap.style.display = 'none';
      scoreDisplay.style.display = 'none';

      wrap.innerHTML = `
        <div class="round-selector-card">
          <h2 class="round-selector-title">Choose Your Round</h2>
          <p class="round-selector-subtitle">25 questions · 8 difficulty levels</p>
          <div class="round-selector" role="group" aria-label="Select difficulty round">
            ${ROUND_META.map((m, i) => {
              const n = i + 1;
              const done = completedRounds.has(n);
              return `
              <button class="round-btn${done ? ' completed' : ''}"
                      data-round="${n}"
                      style="--round-grad:${m.grad}; --round-text:${m.text};"
                      aria-label="Round ${n}: ${m.label}${done ? ' (completed)' : ''}">
                <span class="round-btn-icon" aria-hidden="true">${m.icon}</span>
                <span class="round-btn-num">Round ${n}</span>
                <span class="round-btn-label">${m.label}</span>
              </button>`;
            }).join('')}
          </div>
        </div>`;

      wrap.querySelectorAll('.round-btn').forEach(btn => {
        btn.addEventListener('click', () => handleRoundSelect(parseInt(btn.dataset.round, 10)));
      });
    }

    // ── Handle round selection ─────────────────────────────────
    function handleRoundSelect(roundNum) {
      activeRound = roundNum;
      document.querySelector('.trivia-filter').style.display = 'none';
      document.getElementById('score-display').style.display = 'flex';
      buildDeck(roundNum);
      renderQuestion();
    }

    // ── Build deck ────────────────────────────────────────────
    function buildDeck(roundNumber) {
      const round = QUIZ_ROUNDS[roundNumber - 1];
      if (!round) return;

      deck = shuffle(round.questions).map(q => {
        const paired = q.answers.map((a, i) => ({ text: a, isCorrect: i === q.correct }));
        const shuffled = shuffle(paired);
        return { ...q, shuffledAnswers: shuffled };
      });
      deckIdx = 0;
      scoreCorrect = 0;
      updateScore();
    }

    // ── Score display ─────────────────────────────────────────
    function updateScore(pulse = false) {
      document.getElementById('score-correct').textContent = scoreCorrect;
      document.getElementById('score-total').textContent   = 25;
      if (pulse) {
        const el = document.getElementById('score-display');
        el.classList.remove('pulse');
        void el.offsetWidth;
        el.classList.add('pulse');
      }
    }

    // ── Render question ───────────────────────────────────────
    function renderQuestion() {
      const wrap = document.getElementById('question-wrap');
      const q    = deck[deckIdx];
      const progress = ((deckIdx / deck.length) * 100).toFixed(1);
      const meta = ROUND_META[activeRound - 1];

      wrap.innerHTML = `
        <div class="question-card" role="region" aria-label="Question ${deckIdx + 1} of ${deck.length}"
             style="--series-color:${q.seriesColor}">
          <div class="question-series-header"></div>
          <div class="question-card-top">
            <div class="round-info">${meta.icon} Round ${activeRound} · ${meta.label}</div>
            <span class="question-series-badge"
                  style="--series-color:${q.seriesColor}">${q.seriesLabel}</span>
          </div>
          <div class="progress-bar" role="progressbar"
               aria-valuenow="${deckIdx}" aria-valuemin="0" aria-valuemax="${deck.length}"
               aria-label="Question progress">
            <div class="progress-bar-inner" style="width:${progress}%"></div>
          </div>
          <div class="question-counter">Question ${deckIdx + 1} of ${deck.length}</div>
          <div class="question-body">
            <p class="question-text">${q.q}</p>
          </div>
          <div class="answer-grid" role="group" aria-label="Answer choices">
            ${q.shuffledAnswers.map((a, i) => `
              <button class="answer-btn" data-idx="${i}"
                      aria-label="${ANSWER_LETTERS[i]}: ${a.text}">
                <span class="answer-letter" aria-hidden="true">${ANSWER_LETTERS[i]}</span>
                <span>${a.text}</span>
              </button>`).join('')}
          </div>
        </div>`;

      wrap.querySelectorAll('.answer-btn').forEach(btn => {
        btn.addEventListener('click', () => handleAnswer(btn, q));
      });
    }

    // ── Handle answer ─────────────────────────────────────────
    function handleAnswer(btn, q) {
      const wrap    = document.getElementById('question-wrap');
      const allBtns = wrap.querySelectorAll('.answer-btn');
      const idx     = parseInt(btn.dataset.idx, 10);
      const correct = q.shuffledAnswers[idx].isCorrect;

      allBtns.forEach(b => b.disabled = true);

      if (correct) {
        btn.classList.add('correct');
        scoreCorrect++;
      } else {
        btn.classList.add('wrong');
        allBtns.forEach((b, i) => {
          if (q.shuffledAnswers[i].isCorrect) b.classList.add('reveal-correct');
        });
      }

      deckIdx++;
      updateScore(correct);

      setTimeout(() => {
        if (deckIdx < deck.length) renderQuestion();
        else renderResults();
      }, 950);
    }

    // ── Results ───────────────────────────────────────────────
    function renderResults() {
      const wrap  = document.getElementById('question-wrap');
      const total = deck.length;
      const g     = gradeInfo(scoreCorrect, total);

      saveRoundCompletion(activeRound);
      document.getElementById('score-display').style.display = 'none';

      wrap.innerHTML = `
        <div class="results-card" style="--results-grad:${g.grad}">
          <div class="results-grade" aria-hidden="true">${g.emoji}</div>
          <div class="results-title">${g.title}</div>
          <div class="results-subtitle">
            You got <strong>${scoreCorrect} out of ${total}</strong> — ${g.sub}
          </div>
          <div class="results-buttons">
            <button class="results-again-btn" id="play-again">Play Again</button>
            <button class="results-back-btn" id="back-selector">Back to Rounds</button>
          </div>
        </div>`;

      document.getElementById('play-again').addEventListener('click', () => {
        document.getElementById('score-display').style.display = 'flex';
        buildDeck(activeRound);
        renderQuestion();
      });

      document.getElementById('back-selector').addEventListener('click', renderRoundSelector);
    }

    // ── Keyboard shortcuts (1-4 to pick answer) ───────────────
    document.addEventListener('keydown', (e) => {
      if (!activeRound) return;
      const keyMap = { '1': 0, '2': 1, '3': 2, '4': 3 };
      const idx = keyMap[e.key];
      if (idx === undefined) return;
      const wrap = document.getElementById('question-wrap');
      const btns = wrap.querySelectorAll('.answer-btn:not(:disabled)');
      if (btns[idx]) btns[idx].click();
    });

    // ── Init ──────────────────────────────────────────────────
    renderRoundSelector();
  </script>
</body>
</html>
