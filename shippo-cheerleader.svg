<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Body -->
  <ellipse cx="50" cy="70" rx="22" ry="28" fill="#D4A574"/>

  <!-- Head -->
  <circle cx="50" cy="35" r="20" fill="#CD8B4F"/>

  <!-- Ears -->
  <polygon points="35,15 28,5 33,20" fill="#CD8B4F"/>
  <polygon points="65,15 72,5 67,20" fill="#CD8B4F"/>
  <polygon points="35,15 32,8 34,18" fill="#8B6F47"/>
  <polygon points="65,15 68,8 66,18" fill="#8B6F47"/>

  <!-- Hair ribbon -->
  <rect x="40" y="8" width="20" height="8" fill="#20B2AA" rx="2"/>

  <!-- Eyes -->
  <circle cx="42" cy="32" r="3" fill="#000"/>
  <circle cx="58" cy="32" r="3" fill="#000"/>
  <circle cx="43" cy="31" r="1.5" fill="#FFF"/>
  <circle cx="59" cy="31" r="1.5" fill="#FFF"/>

  <!-- Smile -->
  <path d="M 45 38 Q 50 42 55 38" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Clothes - shirt -->
  <rect x="35" y="50" width="30" height="20" fill="#20B2AA" rx="2"/>
  <circle cx="42" cy="58" r="2" fill="#FFD700"/>
  <circle cx="58" cy="58" r="2" fill="#FFD700"/>

  <!-- Clothes - pants -->
  <rect x="38" y="70" width="24" height="22" fill="#000080"/>

  <!-- Pom-poms left -->
  <circle cx="25" cy="55" r="12" fill="#FF4500" opacity="0.8"/>
  <circle cx="20" cy="50" r="8" fill="#FF6347"/>
  <circle cx="22" cy="62" r="8" fill="#FF6347"/>
  <circle cx="28" cy="48" r="8" fill="#FF6347"/>
  <circle cx="30" cy="65" r="8" fill="#FF6347"/>

  <!-- Pom-poms right -->
  <circle cx="75" cy="55" r="12" fill="#FF4500" opacity="0.8"/>
  <circle cx="80" cy="50" r="8" fill="#FF6347"/>
  <circle cx="78" cy="62" r="8" fill="#FF6347"/>
  <circle cx="72" cy="48" r="8" fill="#FF6347"/>
  <circle cx="70" cy="65" r="8" fill="#FF6347"/>

  <!-- Arms -->
  <rect x="25" y="58" width="8" height="18" fill="#CD8B4F" rx="4"/>
  <rect x="67" y="58" width="8" height="18" fill="#CD8B4F" rx="4"/>

  <!-- Tail -->
  <path d="M 65 90 Q 85 85 90 75" stroke="#CD8B4F" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 65 90 Q 85 85 90 75" stroke="#8B6F47" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="2,4"/>
</svg>