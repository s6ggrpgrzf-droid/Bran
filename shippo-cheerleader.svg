<svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
  <!-- Tail -->
  <g>
    <path d="M 65 95 Q 95 90 100 65" stroke="#C8714F" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Tail stripes -->
    <path d="M 68 93 L 72 89" stroke="#8B5A2B" stroke-width="1.5" opacity="0.6"/>
    <path d="M 78 87 L 82 83" stroke="#8B5A2B" stroke-width="1.5" opacity="0.6"/>
    <path d="M 88 78 L 92 74" stroke="#8B5A2B" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Body/Clothes -->
  <ellipse cx="50" cy="85" rx="23" ry="28" fill="#2FA8A8"/>
  <!-- Shirt details -->
  <path d="M 40 75 Q 50 72 60 75" stroke="#FFD700" stroke-width="2" fill="none" opacity="0.8"/>
  <circle cx="45" cy="85" r="2.5" fill="#FFD700"/>
  <circle cx="55" cy="85" r="2.5" fill="#FFD700"/>

  <!-- Pants -->
  <rect x="42" y="110" width="16" height="18" fill="#1a1a4d" rx="2"/>

  <!-- Paws/Feet -->
  <circle cx="46" cy="130" r="3" fill="#C8714F"/>
  <circle cx="54" cy="130" r="3" fill="#C8714F"/>

  <!-- Arms with sleeves -->
  <g>
    <!-- Left arm -->
    <rect x="26" y="75" width="8" height="20" fill="#2FA8A8" rx="4"/>
    <circle cx="26" cy="95" r="4" fill="#C8714F"/>
    <!-- Right arm -->
    <rect x="66" y="75" width="8" height="20" fill="#2FA8A8" rx="4"/>
    <circle cx="74" cy="95" r="4" fill="#C8714F"/>
  </g>

  <!-- Head (larger, more fox-like) -->
  <circle cx="50" cy="45" r="24" fill="#C8714F"/>

  <!-- Snout/Muzzle (fox feature) -->
  <ellipse cx="50" cy="52" rx="12" ry="10" fill="#E8B384"/>

  <!-- Ears (pointed fox ears) -->
  <g>
    <!-- Left ear outer -->
    <polygon points="32,20 24,0 28,28" fill="#C8714F"/>
    <!-- Left ear inner -->
    <polygon points="32,20 28,8 30,26" fill="#E8B384"/>
    <!-- Right ear outer -->
    <polygon points="68,20 76,0 72,28" fill="#C8714F"/>
    <!-- Right ear inner -->
    <polygon points="68,20 72,8 70,26" fill="#E8B384"/>
  </g>

  <!-- Hair/Head fluff -->
  <path d="M 35 25 Q 30 15 35 10 Q 40 5 45 8" fill="#D4860F"/>
  <path d="M 55 8 Q 60 5 65 10 Q 70 15 65 25" fill="#D4860F"/>

  <!-- Hair ribbon (blue) -->
  <rect x="38" y="12" width="24" height="8" fill="#2FA8A8" rx="3"/>
  <circle cx="42" cy="14" r="2.5" fill="#2FA8A8"/>
  <circle cx="58" cy="14" r="2.5" fill="#2FA8A8"/>

  <!-- Eyes (big and expressive) -->
  <g>
    <!-- Left eye white -->
    <ellipse cx="42" cy="42" rx="5" ry="6" fill="#FFF"/>
    <!-- Left pupil -->
    <circle cx="42" cy="43" r="3" fill="#000"/>
    <!-- Left eye shine -->
    <circle cx="43" cy="41" r="1.5" fill="#FFF"/>

    <!-- Right eye white -->
    <ellipse cx="58" cy="42" rx="5" ry="6" fill="#FFF"/>
    <!-- Right pupil -->
    <circle cx="58" cy="43" r="3" fill="#000"/>
    <!-- Right eye shine -->
    <circle cx="59" cy="41" r="1.5" fill="#FFF"/>
  </g>

  <!-- Eyebrows -->
  <path d="M 38 37 Q 42 35 46 37" stroke="#8B5A2B" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 54 37 Q 58 35 62 37" stroke="#8B5A2B" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <ellipse cx="50" cy="50" rx="2" ry="2.5" fill="#000"/>

  <!-- Mouth (happy expression) -->
  <path d="M 48 55 Q 50 58 52 55" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Blush marks -->
  <circle cx="32" cy="48" r="3" fill="#FFB6C1" opacity="0.7"/>
  <circle cx="68" cy="48" r="3" fill="#FFB6C1" opacity="0.7"/>

  <!-- Pom-poms (cheerleader) -->
  <g>
    <!-- Left pom-pom -->
    <circle cx="18" cy="70" r="10" fill="#FF4500" opacity="0.8"/>
    <circle cx="14" cy="63" r="6" fill="#FF6347"/>
    <circle cx="16" cy="78" r="6" fill="#FF6347"/>
    <circle cx="22" cy="62" r="6" fill="#FF6347"/>
    <circle cx="24" cy="80" r="6" fill="#FF6347"/>
    <!-- Right pom-pom -->
    <circle cx="82" cy="70" r="10" fill="#FF4500" opacity="0.8"/>
    <circle cx="86" cy="63" r="6" fill="#FF6347"/>
    <circle cx="84" cy="78" r="6" fill="#FF6347"/>
    <circle cx="78" cy="62" r="6" fill="#FF6347"/>
    <circle cx="76" cy="80" r="6" fill="#FF6347"/>
  </g>
</svg>