<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Body -->
  <ellipse cx="50" cy="70" rx="20" ry="26" fill="#D4A574"/>

  <!-- Head -->
  <circle cx="50" cy="38" r="18" fill="#CD8B4F"/>

  <!-- Ears -->
  <polygon points="38,22 32,10 37,25" fill="#CD8B4F"/>
  <polygon points="62,22 68,10 63,25" fill="#CD8B4F"/>
  <polygon points="38,22 35,14 36,24" fill="#8B6F47"/>
  <polygon points="62,22 65,14 64,24" fill="#8B6F47"/>

  <!-- Hair ribbon -->
  <rect x="42" y="12" width="16" height="7" fill="#20B2AA" rx="2"/>

  <!-- Eyes -->
  <circle cx="44" cy="35" r="2.5" fill="#000"/>
  <circle cx="56" cy="35" r="2.5" fill="#000"/>
  <circle cx="45" cy="34" r="1.2" fill="#FFF"/>
  <circle cx="57" cy="34" r="1.2" fill="#FFF"/>

  <!-- Big happy smile -->
  <path d="M 43 42 Q 50 46 57 42" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 45 42 Q 50 44 55 42" fill="#FFB6C1" opacity="0.6"/>

  <!-- Clothes - shirt -->
  <rect x="36" y="52" width="28" height="18" fill="#20B2AA" rx="2"/>
  <circle cx="44" cy="59" r="1.8" fill="#FFD700"/>
  <circle cx="56" cy="59" r="1.8" fill="#FFD700"/>

  <!-- Clothes - pants -->
  <rect x="40" y="70" width="20" height="20" fill="#000080"/>

  <!-- Left arm (waving) -->
  <rect x="30" y="60" width="7" height="16" fill="#CD8B4F" rx="3.5" transform="rotate(-35 33 60)"/>
  <circle cx="25" cy="52" r="5" fill="#CD8B4F"/>

  <!-- Right arm -->
  <rect x="63" y="60" width="7" height="14" fill="#CD8B4F" rx="3.5"/>
  <circle cx="68" cy="76" r="4" fill="#CD8B4F"/>

  <!-- Tail -->
  <path d="M 65 88 Q 80 90 85 80" stroke="#CD8B4F" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M 65 88 Q 80 90 85 80" stroke="#8B6F47" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-dasharray="2,3"/>

  <!-- Hands -->
  <circle cx="23" cy="48" r="4" fill="#D4A574"/>
  <circle cx="69" cy="72" r="3.5" fill="#D4A574"/>
</svg>